<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7akim Space | مثال</title>
    <style>
        /* --- 1. الأساسيات --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff; 
            color: #333;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* --- 2. البار العلوي --- */
        nav {
            background: #000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: bold; color: #00d2ff; }
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; }
        nav a { text-decoration: none; color: white; font-weight: bold; }

        /* --- 3. القسم الرئيسي --- */
        #hero {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #f8f9fa;
            padding: 0 10%;
            margin-top: 60px;
        }
        #hero h1 { font-size: 3rem; color: #000; margin-bottom: 10px; }
        #hero p { font-size: 1.2rem; color: #666; }

        /* --- 4. الخانات (مكعبات الزهر) --- */
        .services { padding: 60px 10%; background: #ffffff; text-align: center; }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #eee;
            padding: 50px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: inherit;
            display: block;
            box-shadow: 8px 8px 20px #d1d9e6, -8px -8px 20px #ffffff;
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 12px 12px 25px #c2ccd8, -12px -12px 25px #ffffff;
            border-color: #00d2ff;
        }
        .card h3 { color: #00d2ff; margin-bottom: 10px; font-size: 1.5rem; }

        /* --- 5. النموذج --- */
        #contact { padding: 60px 10%; background: #f1f3f5; text-align: center; }
        .contact-form {
            max-width: 500px;
            margin: 0 auto;
            text-align: right;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .btn-submit {
            background: #d35400;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        footer { padding: 30px; background: #000; color: white; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">7akim Space</div>
        <ul>
            <li><a href="#hero">مثال</a></li>
            <li><a href="#about">مثال</a></li>
            <li><a href="#contact">مثال</a></li>
        </ul>
    </nav>

    <section id="hero">
        <h1>مثال</h1>
        <p>مثال</p>
    </section>

    <section id="about" class="services">
        <h2>مثال</h2>
        <div class="cards-container">
            <a href="#contact" class="card">
                <h3>مثال</h3>
                <p>مثال</p>
            </a>
            <a href="#contact" class="card">
                <h3>مثال</h3>
                <p>مثال</p>
            </a>
            <a href="#contact" class="card">
                <h3>مثال</h3>
                <p>مثال</p>
            </a>
        </div>
    </section>

    <section id="contact">
        <h2>مثال</h2>
        <div class="contact-form">
            <input type="text" placeholder="مثال">
            <input type="email" placeholder="مثال">
            <textarea rows="4" placeholder="مثال"></textarea>
            <button class="btn-submit">مثال</button>
        </div>
    </section>

    <footer>
        <p>مثال</p>
        <p>© 2026 مثال</p>
    </footer>

</body>
</html>
