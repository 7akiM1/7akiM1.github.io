<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7akim Space | مثال</title>
    <style>
        /* --- 1. الأساسيات --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: #ffffff; 
            color: #333;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* --- 2. البار العلوي --- */
        nav {
            background: #000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: bold; color: #00d2ff; }
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; }
        nav a { text-decoration: none; color: white; font-weight: bold; font-size: 14px; }

        /* --- 3. القسم الرئيسي --- */
        #hero {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #f8f9fa;
            padding: 0 10%;
            margin-top: 60px;
        }
        #hero h1 { font-size: 3rem; color: #000; margin: 0; }

        /* --- 4. الخانات (6 مكعبات) --- */
        .services { padding: 60px 10%; background: #ffffff; text-align: center; }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #eee;
            padding: 50px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            display: block;
            box-shadow: 10px 10px 25px #d1d9e6, -10px -10px 25px #ffffff;
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 15px 15px 35px #c2ccd8, -15px -15px 35px #ffffff;
            border-color: #00d2ff;
        }
        .card h3 { color: #00d2ff; margin-bottom: 10px; font-size: 1.5rem; }

        /* --- 5. نموذج الاتصال (Contact Section) --- */
        #contact { padding: 80px 10%; background: #f8f9fa; text-align: center; }
        .contact-container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: right;
        }
        .contact-container h2 { text-align: center; margin-bottom: 30px; color: #000; }
        input, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            background: #fdfdfd;
        }
        .btn-submit {
            background: #000;
            color: #fff;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #00d2ff; }

        /* --- 6. الفوتر --- */
        footer { padding: 40px; background: #000; color: white; text-align: center; }
        footer p { margin: 5px 0; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">7akim Space</div>
        <ul>
            <li><a href="#hero">مثال</a></li>
            <li><a href="#about">مثال</a></li>
            <li><a href="#contact">تواصل معي</a></li>
        </ul>
    </nav>

    <section id="hero">
        <h1>مثال</h1>
    </section>

    <section id="about" class="services">
        <h2>مثال</h2>
        <div class="cards-container">
            <a href="https://google.com" target="_blank" class="card"><h3>مثال 1</h3><p>مثال</p></a>
            <a href="https://google.com" target="_blank" class="card"><h3>مثال 2</h3><p>مثال</p></a>
            <a href="https://google.com" target="_blank" class="card"><h3>مثال 3</h3><p>مثال</p></a>
            <a href="https://google.com" target="_blank" class="card"><h3>مثال 4</h3><p>مثال</p></a>
            <a href="https://google.com" target="_blank" class="card"><h3>مثال 5</h3><p>مثال</p></a>
            <a href="https://google.com" target="_blank" class="card"><h3>مثال 6</h3><p>مثال</p></a>
        </div>
    </section>

    <section id="contact">
        <div class="contact-container">
            <h2>مثال</h2>
            <input type="text" placeholder="مثال">
            <input type="email" placeholder="مثال">
            <textarea rows="5" placeholder="مثال"></textarea>
            <button class="btn-submit">مثال</button>
        </div>
    </section>

    <footer>
        <p>مثال</p>
        <p>© 2026 مثال</p>
    </footer>

</body>
</html>
